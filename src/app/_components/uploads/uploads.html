<div class="uploads-container">
  <h1 class="page-title">Upload Files</h1>

  <input #fileInput type="file" multiple hidden (change)="onFileSelected($event)">

  <div class="upload-area"
     (click)="fileInput.click()"
     (dragover)="onDragOver($event)"
     (dragleave)="onDragLeave($event)"
     (drop)="onDrop($event)"
     [class.dragging]="isDragging">

  <div class="upload-icon">
    <i class="fas fa-cloud-upload-alt"></i>
  </div>
  <h3>Drag & Drop Files</h3>
  <p>{{ isDragging ? 'Drop files here...' : 'Click or drag files to upload' }}</p>
</div>



  
  <div *ngIf="selectedFiles.length > 0" class="selected-files">
    <h3>Selected Files</h3>
    <div *ngFor="let file of selectedFiles" class="file-item">
      {{file.name}} ({{file.size}} bytes)
    </div>
  </div>

  
  <div class="upload-action">
    <button class="upload-btn primary" (click)="upload()">
      <i class="fas fa-upload"></i>
      Upload {{selectedFiles.length}} File(s)
    </button>
  </div>

  <!--Uploaded Files Display -->

    <div class="upload-action">
    <button class="upload-btn primary" (click)="loadFiles()">
      <i class="fas fa-database"></i>
      Show Data
    </button>
  </div>

  <div class="uploaded-files" *ngIf="uploadedFiles.length > 0">
  <h3>Uploaded Files</h3>

    <div class="file-grid">
      <div *ngFor="let file of uploadedFiles" class="file-card">

        <!-- Preview -->
        <div class="file-preview">
          <img *ngIf="file.type.startsWith('image')" [src]="file.url" />
          
          <!-- File Icons -->
          <i *ngIf="file.type.includes('pdf')" class="fas fa-file-pdf file-icon"></i>
          <i *ngIf="file.type.includes('word') || file.type.includes('doc')" class="fas fa-file-word file-icon"></i>
          <i *ngIf="file.type.includes('excel') || file.type.includes('sheet') || file.type.includes('xls')" class="fas fa-file-excel file-icon"></i>

            <i *ngIf="!file.type.startsWith('image') 
              && !file.type.includes('pdf') 
              && !file.type.includes('word') 
              && !file.type.includes('doc') 
              && !file.type.includes('excel') 
              && !file.type.includes('xls')" 
             class="fas fa-file file-icon">
          </i>

        </div>

        <!-- Info -->
        <div class="file-info">
          <div class="file-name">{{ file.name }}</div>
          <div class="file-type">{{ file.type }}</div>
        </div>

        <!-- Actions -->
        <div class="file-actions">
          <a [href]="file.url" target="_blank">Open</a>
          <button *ngIf="file.id" (click)="delete(file.id)">Delete</button>
        </div>

      </div>
    </div>
  </div>


</div>
