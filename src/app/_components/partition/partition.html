<div class="partitions-container">
  <!-- Header -->
  <div class="partitions-header">
    <h1 class="page-title">Storage Partitions</h1>
    <p class="description">
      Organize your files into separate storage partitions with individual quotas.
      Think of them as separate drives for different purposes.
    </p>
  </div>

  <!-- Partitions List -->
  <div class="partitions-grid">
    <!-- Personal Partition -->
    <div class="partition-card">
      <div class="card-header">
        <div class="partition-icon">📁</div>
        <div>
          <h2 class="partition-name">Personal</h2>
          <span class="status-badge healthy">Healthy</span>
        </div>
      </div>
      <div class="partition-details">
        <div class="usage-info">
          <span class="usage-value">0 B of 5.0 GB used</span>
          <span class="file-count">• 0 files</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Work Partition -->
    <div class="partition-card">
      <div class="card-header">
        <div class="partition-icon">💼</div>
        <div>
          <h2 class="partition-name">Work</h2>
          <span class="status-badge healthy">Healthy</span>
        </div>
      </div>
      <div class="partition-details">
        <div class="usage-info">
          <span class="usage-value">0 B of 5.0 GB used</span>
          <span class="file-count">• 1 file</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: 0%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Optional: Add New Partition Button -->
  <button class="add-partition-btn">
    <span class="btn-icon">+</span> New Partition
  </button>
</div>
