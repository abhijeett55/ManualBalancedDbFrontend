<div class="files-container">
  <!-- Header row -->
  <div class="files-header">
    <h1 class="page-title">My Drive</h1>
    <div class="stats">
      <span class="stat-item">Total Files: <strong>0</strong></span>
      <span class="stat-item">Storage Used: <strong>0 MB</strong></span>
    </div>
  </div>

  <!-- Action bar -->
  <div class="action-bar">
    <button class="upload-btn">
      <span class="btn-icon">+</span> Upload
    </button>
    <div class="sort-filter">
      <span class="sort-label">Sort by:</span>
      <div class="filter-chips">
        <span class="chip">Date</span>
        <span class="chip">Modified: Any time</span>
        <span class="chip">Type: All</span>
        <span class="chip">Partition: All Partitions</span>
      </div>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state">
    <div class="empty-icon">📁</div>
    <h2 class="empty-title">No files found</h2>
    <p class="empty-message">Upload some files to get started!</p>
    <button class="upload-empty-btn">
      <span class="btn-icon">+</span> Upload Files
    </button>
  </div>
</div>
