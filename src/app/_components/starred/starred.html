<div class="starred-container">
  <!-- Header row with title and upload button -->
  <div class="starred-header">
    <h1 class="page-title">★ Starred Files</h1>
    <button class="upload-btn">
      <span class="btn-icon">+</span> Upload
    </button>
  </div>

  <!-- Stats bar -->
  <div class="stats-bar">
    <span class="stat-item">Total Files: <strong>0</strong></span>
    <span class="stat-item">Storage Used: <strong>0 MB</strong></span>
  </div>

  <!-- Filter row -->
  <div class="filter-row">
    <span class="sort-label">Sort by:</span>
    <div class="sort-chip">Name</div>
  </div>

  <!-- Empty state -->
  <div class="empty-state">
    <div class="empty-icon">★</div>
    <h2 class="empty-title">No starred files</h2>
    <p class="empty-message">Star files that are important to you for quick access</p>
    <button class="drive-btn">Go to My Drive</button>
  </div>
</div>
